<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlmImageCreator</title>
    <meta name="description" content="Generate images using OpenRouter AI models">
    <meta name="theme-color" content="#343a40">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ImgCreator">
    <link rel="manifest" href="manifest.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
        }
        #toolbar {
            padding: 0.5rem 1rem;
        }
        #main-content {
            padding: 1rem;
            height: calc(100vh - 60px);
        }
        #left-column {
            height: 100%;
            overflow-y: auto;
            border-radius: 0.25rem;
            padding: 1rem;
        }
        #right-column {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #conversation-area {
            flex: 1;
            overflow-y: auto;
            border-radius: 0.25rem;
            padding: 1rem;
            min-height: 0;
        }
        #input-container {
            flex-shrink: 0;
        }
        #user-input {
            resize: none;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .user-input-collapsed {
            height: 3em;
            min-height: 3em;
            max-height: 3em;
            transition: height 0.3s ease, max-height 0.3s ease;
        }
        .user-input-expanded {
            height: 45em;
            min-height: 45em;
            max-height: calc(100vh - 180px);
            transition: height 0.3s ease, max-height 0.3s ease;
        }
        .dropdown-item {
            cursor: pointer;
        }
        #toggle-sidebar-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            margin-right: 0.5rem;
        }
        #balance-display {
            white-space: nowrap;
        }
        .message-item {
            border-radius: 0.25rem;
        }
        .assistant-message img {
            border-radius: 0.25rem;
        }
        .conversation-item:hover,
        .hover-effect:hover {
            background-color: #6c757d !important;
        }
        .cursor-pointer {
            cursor: pointer;
        }
        .conversation-item.selected {
            background-color: #0d6efd !important;
            color: white !important;
        }
        #conversation-scroll-sentinel {
            height: 1px;
            clear: both;
        }
    </style>
</head>
<body>
    <nav id="toolbar" class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button id="toggle-sidebar-btn" class="btn" aria-label="Toggle sidebar" title="Toggle sidebar">&#9776;</button>

                <button id="new-conversation-btn" class="btn btn-outline-light btn-sm me-2" type="button" title="Start a new conversation">
                    <span>＋</span>
                </button>


                <div class="dropdown me-2">
                    <button id="model-dropdown" class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" title="Select AI model" aria-expanded="false">
                        Select Model
                    </button>
                    <ul id="model-menu" class="dropdown-menu" aria-labelledby="model-dropdown">
                        <li><a class="dropdown-item" href="#">Enter API key to load models</a></li>
                    </ul>
                </div>


                <div class="dropdown me-2">
                    <button id="resolution-dropdown" class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" title="Select image resolution" aria-expanded="false">
                        1K
                    </button>
                    <ul id="resolution-menu" class="dropdown-menu" aria-labelledby="resolution-dropdown">
                        <li><a class="dropdown-item" href="#">1K</a></li>
                        <li><a class="dropdown-item" href="#">2K</a></li>
                        <li><a class="dropdown-item" href="#">4K</a></li>
                    </ul>
                </div>

                <div class="dropdown me-2">
                    <button id="aspect-ratio-dropdown" class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" title="Select aspect ratio" aria-expanded="false">
                        1:1
                    </button>
                    <ul id="aspect-ratio-menu" class="dropdown-menu" aria-labelledby="aspect-ratio-dropdown">
                        <li><a class="dropdown-item" href="#">1:1</a></li>
                        <li><a class="dropdown-item" href="#">16:9</a></li>
                        <li><a class="dropdown-item" href="#">3:2</a></li>
                        <li><a class="dropdown-item" href="#">21:9</a></li>
                    </ul>
                </div>
            </div>

            <div class="d-flex align-items-center">
                <button id="sync-directory-btn" class="btn btn-outline-light btn-sm me-2" title="Sync images to external folder">🖴</button>
                <button id="install-btn" class="btn btn-outline-light btn-sm me-2" style="display: none;" title="Install this app">Install App</button>
                <button id="settings-btn" class="btn btn-outline-light btn-sm me-2" title="Settings">⚙️</button>
                <span id="balance-display" class="text-light">Enter API key to view balance</span>
            </div>
        </div>
    </nav>

    <div id="sync-progress-container" class="container-fluid" style="display: none; padding: 0.25rem 1rem;">
        <div class="progress" style="height: 6px;">
            <div id="sync-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;"></div>
        </div>
        <div id="sync-progress-text" class="small text-light" style="text-align: center;"></div>
    </div>

    <div id="main-content" class="container-fluid">
        <div class="row h-100">
            <div id="left-column" class="col-4 d-none">
                <h6>Conversations</h6>
                <hr>
                <div id="conversation-history"></div>
            </div>

            <div id="right-column" class="col-12">
                <div id="input-container" class="mb-2">
                    <textarea id="user-input" class="form-control user-input-expanded" rows="2" placeholder="Describe the image you want to generate..."></textarea>
                    <div id="ref-images-toolbar-container"></div>
                    <div class="row mb-2">
                        <div class="col">
                            <button id="generate-button" type="button" class="btn btn-primary w-100" disabled title="Generate image">Generate</button>
                        </div>
                    </div>
                </div>
                <!-- Error display container (non-scrollable) -->
                <div id="error-container" style="min-height: 0;"></div>
                <!-- Rating filter for conversation view -->
                <div id="conversation-rating-filter-container" class="d-flex align-items-center gap-2 mb-2" style="display: none;">
                    <label class="small text-muted mb-0">Min rating:</label>
                    <select id="conversation-rating-filter" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: auto;">
                        <option value="">All</option>
                        <option value="5">★★★★★</option>
                        <option value="4">★★★★☆+</option>
                        <option value="3">★★★☆☆+</option>
                        <option value="2">★★☆☆☆+</option>
                        <option value="1">★☆☆☆☆+</option>
                        <option value="0">Unrated only</option>
                    </select>
                </div>
                <!-- Scrollable conversation area -->
                <div id="conversation-area"></div>
                <div id="conversation-scroll-sentinel"></div>
            </div>
        </div>
    </div>

    <div id="warning-display" style="display: none;"></div>

    <!-- Template for conversation item in history sidebar -->
    <template id="conversation-item-template">
        <div class="conversation-item mb-2 p-2 rounded cursor-pointer" data-timestamp="">
            <div id="conversation-date" class="fw-bold conversation-date"></div>
            <div id="conversation-preview" class="small text-muted conversation-preview"></div>
        </div>
    </template>

    <!-- Template for conversation message entry -->
    <template id="message-entry-template">
        <div class="message-entry mb-3">
            <div class="card bg-dark text-white border-secondary">
                <div class="card-header user-instructions bg-secondary">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong class="model-name-display">Your Instructions:</strong>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-outline-light regenerate-entry-x5-btn" title="Regenerate 5 times">
                                <span>⟳5</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light regenerate-entry-btn" title="Regenerate with new seed">
                                <span>⟳</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light copy-prompt-btn" title="Copy prompt to clipboard">
                                <span>📋</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light copy-to-textarea-btn" title="Copy to textarea">
                                <span><b>⇑</b></span>
                            </button>
                        </div>
                    </div>
                    <div class="user-prompt-text mt-2 small"></div>
                </div>
                
                <div class="card-body">
                    <div class="images-container mb-3"></div>
                    
                    <div class="llm-response-section">
                        <button type="button" class="btn btn-sm btn-outline-secondary toggle-llm-text mb-2" title="Toggle response visibility">
                            <span class="expand-icon">▼</span>
                            <span class="collapse-icon" style="display:none">▲</span>
                            <span class="btn-text">Show Response</span>
                        </button>
                        <div class="llm-text-content collapsed">
                            <div class="d-flex justify-content-end mb-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary copy-llm-btn" title="Copy text">
                                    <span>⇑</span>
                                </button>
                            </div>
                            <div class="llm-text-body"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Template for generated image with controls -->
    <template id="image-entry-template">
        <div class="image-item-container">
            <div class="image-wrapper">
                <img class="generated-image">
                <div class="bottom-buttons">
                    <div class="row w-100 m-0">
                        <div class="col p-0"></div>
                        <div class="col-auto p-0 d-flex gap-1">
                            <button type="button" class="btn btn-sm btn-outline-light image-btn tag-btn" title="Edit tags">
                                <span>🏷️</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light image-btn rate-btn" title="Rate image">
                                <span>⭐</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light image-btn download-btn" title="Download image">
                                <span>💾</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="top-buttons">
                    <div class="row w-100 m-0">
                        <div class="col-auto p-0">
                            <button type="button" class="btn btn-sm btn-outline-light image-btn add-ref-btn" title="Add to reference images">
                                <span><b>⇑</b></span>
                            </button>
                        </div>
                        <div class="col p-0"></div>
                        <div class="col-auto p-0 d-flex gap-1">
                            <button type="button" class="btn btn-sm btn-outline-light image-btn regenerate-x5-btn" title="Regenerate 5 times">
                                <span>⟳5</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light image-btn regenerate-new-btn" title="Regenerate with new seed">
                                <span>⟳</span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-light image-btn regenerate-larger-btn" title="Regenerate in 4K resolution">
                                <span>✨</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="rating-overlay" style="display: none;"></div>
            </div>
            <div class="image-tags-container"></div>
        </div>
    </template>

    <!-- rating-picker-template: Popup for rating an image -->
    <template id="rating-picker-template">
        <div class="rating-picker">
            <span class="rating-star" data-value="1">★</span>
            <span class="rating-star" data-value="2">★</span>
            <span class="rating-star" data-value="3">★</span>
            <span class="rating-star" data-value="4">★</span>
            <span class="rating-star" data-value="5">★</span>
            <button class="clear-rating-btn" title="Clear rating">✕</button>
        </div>
    </template>

    <!-- Template for loading spinner -->
    <template id="image-loading-template">
        <div class="image-item-container">
            <div class="image-wrapper d-flex justify-content-center align-items-center" style="min-width: 300px; min-height: 300px; background-color: #2d2d2d; border-radius: 8px;">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Generating...</span>
                </div>
            </div>
        </div>
    </template>

    <!-- error-box-template: Template for error display -->
    <template id="error-box-template">
        <div class="alert alert-danger" role="alert" style="margin-bottom: 0.5rem;">
            <div class="d-flex justify-content-between align-items-start">
                <div class="error-content flex-grow-1">
                    <strong class="error-title"></strong>
                    <div class="error-message mb-2"></div>
                    <!-- Details section, always visible (expanded by default) -->
                    <div class="error-details" style="display: none;">
                        <div class="error-status small"></div>
                        <div class="error-code small"></div>
                        <div class="error-type small"></div>
                        <div class="error-raw small text-muted word-break"></div>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white error-dismiss" aria-label="Close"></button>
            </div>
        </div>
    </template>

    <!-- settings-dialog-template: Template for the settings configuration dialog with tabs -->
    <template id="settings-dialog-template">
        <div class="modal modal-xl fade" id="settings-modal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Settings</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <ul class="nav nav-tabs border-secondary mb-3" id="settings-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active text-white" id="settings-general-tab" type="button" role="tab" data-action="tab-general">General</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link text-white" id="settings-projects-tab" type="button" role="tab" data-action="tab-projects">Projects</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="settings-tab-content">
                            <!-- General tab: Global defaults -->
                            <div class="tab-pane fade show active" id="settings-general-pane" role="tabpanel">
                                <div class="mb-3">
                                    <label for="settings-api-key-input" class="form-label">OpenRouter API Key</label>
                                    <input id="settings-api-key-input" type="password" autocomplete="current-password" class="form-control" placeholder="Enter your OpenRouter API key">
                                    <div class="form-text">Your API key is stored locally in your browser and never sent anywhere except OpenRouter.</div>
                                </div>
                                <hr>
                                <div class="mb-3">
                                    <label for="upscaling-model-select" class="form-label">Upscaling Model</label>
                                    <select id="upscaling-model-select" class="form-select" aria-label="Select upscaling model">
                                        <option value="" disabled selected>Select a model for upscaling images to 4K</option>
                                    </select>
                                    <div class="form-text">Select one to enable the "Regenerate in 4K" button.</div>
                                </div>
                                <hr>
                                <h6 class="mb-3">Default Settings for Projects</h6>
                                <div class="mb-3">
                                    <label for="default-system-prompt-textarea" class="form-label">System Prompt</label>
                                    <textarea id="default-system-prompt-textarea" class="form-control" rows="4" placeholder="Enter system prompt..."></textarea>
                                    <div class="form-text">Default system prompt used for all image generations.</div>
                                </div>
                                <div class="mb-3">
                                    <label for="default-resolution-select" class="form-label">Default Resolution</label>
                                    <select id="default-resolution-select" class="form-select bg-dark text-white border-secondary">
                                        <option value="1K">1K</option>
                                        <option value="2K">2K</option>
                                        <option value="4K">4K</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="default-aspect-ratio-select" class="form-label">Default Aspect Ratio</label>
                                    <select id="default-aspect-ratio-select" class="form-select bg-dark text-white border-secondary">
                                        <option value="1:1">1:1</option>
                                        <option value="16:9">16:9</option>
                                        <option value="3:2">3:2</option>
                                        <option value="21:9">21:9</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="default-rating-filter-select" class="form-label">Default Rating Filter</label>
                                    <select id="default-rating-filter-select" class="form-select bg-dark text-white border-secondary">
                                        <option value="">Show all images</option>
                                        <option value="5">★★★★★</option>
                                        <option value="4">★★★★☆+</option>
                                        <option value="3">★★★☆☆+</option>
                                        <option value="2">★★☆☆☆+</option>
                                        <option value="1">★☆☆☆☆+</option>
                                    </select>
                                    <div class="form-text">Default minimum rating filter for projects. Unrated images are always shown.</div>
                                </div>
                                <div class="mb-3">
                                    <label for="default-model-select" class="form-label">Default Model</label>
                                    <select id="default-model-select" class="form-select bg-dark text-white border-secondary">
                                        <option value="">None (no default)</option>
                                    </select>
                                    <div class="form-text">Default model to auto-select when switching to a project.</div>
                                </div>
                            </div>
                            <!-- Projects tab: Sub-project management -->
                            <div class="tab-pane fade" id="settings-projects-pane" role="tabpanel">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="mb-0">Sub-Projects</h6>
                                    <button id="add-project-btn" type="button" class="btn btn-sm btn-outline-light">+ New Project</button>
                                </div>
                                <div id="projects-list" class="mb-3"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button id="settings-save-btn" type="button" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- project-editor-template: Template for editing a single project's settings -->
    <template id="project-editor-template">
        <div class="project-editor border border-secondary rounded mb-3">
            <div class="project-editor-header bg-secondary p-2 d-flex justify-content-between align-items-center cursor-pointer" role="button">
                <span class="project-editor-name fw-bold"></span>
                <div class="d-flex gap-1">
                    <button type="button" class="btn btn-sm btn-outline-light project-reparent-btn" title="Reparent project">↕</button>
                    <button type="button" class="btn btn-sm btn-outline-danger project-delete-btn" title="Delete project">✕</button>
                </div>
            </div>
            <div class="project-editor-body p-3" style="display: none;">
                <div class="mb-2">
                    <label class="form-label small">Name</label>
                    <input type="text" class="form-control form-control-sm project-name-input">
                </div>
                <div class="mb-2">
                    <label class="form-label small">Description</label>
                    <textarea class="form-control form-control-sm project-description-input" rows="1"></textarea>
                </div>
                <div class="mb-2">
                    <label class="form-label small">Parent Project</label>
                    <select class="form-select form-select-sm project-parent-select"></select>
                </div>
                <hr class="my-2">
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">Instructions</label>
                    <div class="col-lg-10">
                        <textarea class="form-control form-control-sm project-instructions-input" rows="4" placeholder="Instructions appended to every generation..."></textarea>
                    </div>
                </div>
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">System Prompt</label>
                    <div class="col-lg-10">
                        <button type="button" class="btn btn-sm btn-outline-secondary project-set-system-prompt-btn">Set system prompt</button>
                        <textarea class="form-control form-control-sm project-system-prompt-input" rows="2" placeholder="System prompt..." style="display: none;"></textarea>
                    </div>
                </div>
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">Model</label>
                    <div class="col-lg-4">
                        <select class="form-select form-select-sm project-model-input">
                            <option value="">Inherited</option>
                        </select>
                    </div>
                </div>
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">Resolution</label>
                    <div class="col-lg-4">
                        <select class="form-select form-select-sm project-resolution-input">
                            <option value="">Inherited</option>
                            <option value="1K">1K</option>
                            <option value="2K">2K</option>
                            <option value="4K">4K</option>
                        </select>
                    </div>
                </div>
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">Aspect Ratio</label>
                    <div class="col-lg-4">
                        <select class="form-select form-select-sm project-aspect-ratio-input">
                            <option value="">Inherited</option>
                            <option value="1:1">1:1</option>
                            <option value="16:9">16:9</option>
                            <option value="3:2">3:2</option>
                            <option value="21:9">21:9</option>
                        </select>
                    </div>
                </div>
                <div class="mb-2 row">
                    <label class="col-form-label col-lg-2 small">Rating Filter</label>
                    <div class="col-lg-4">
                        <select class="form-select form-select-sm project-rating-filter-input">
                            <option value="">Inherited</option>
                            <option value="5">★★★★★</option>
                            <option value="4">★★★★☆+</option>
                            <option value="3">★★★☆☆+</option>
                            <option value="2">★★☆☆☆+</option>
                            <option value="1">★☆☆☆☆+</option>
                        </select>
                    </div>
                </div>
                <hr class="my-2">
                <div class="mb-2">
                    <label class="form-label small">Conversations in this project</label>
                    <div class="project-conversations-list small"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- project-conversation-item-template: A conversation entry in a project's conversation list -->
    <template id="project-conversation-item-template">
        <div class="d-flex justify-content-between align-items-center mb-1 p-1 bg-dark rounded">
            <span class="conversation-item-title small text-truncate me-2" style="max-width: 200px;"></span>
            <select class="form-select form-select-sm conversation-move-select" style="width: auto; min-width: 120px;">
                <option value="">Move to...</option>
            </select>
        </div>
    </template>

    <!-- project-selector-template: Dropdown in toolbar for selecting current project -->
    <template id="project-selector-template">
        <div class="dropdown me-2">
            <button id="project-selector-btn" class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" title="Select project" aria-expanded="false">
                Root
            </button>
            <ul id="project-selector-menu" class="dropdown-menu dropdown-menu-dark" aria-labelledby="project-selector-btn"></ul>
        </div>
    </template>

    <!-- ref-images-toolbar-template: Toolbar for reference images between textarea and generate button -->
    <template id="ref-images-toolbar-template">
        <div class="ref-images-toolbar" style="min-height: 38px;">
            <div class="d-flex align-items-center w-100">
                <button id="add-ref-image-btn" class="btn btn-outline-light btn-sm" type="button" title="Add reference image">
                    <span>＋</span>
                </button>
                <div id="ref-images-container" class="d-flex align-items-center flex-wrap gap-2 ms-2 overflow-auto" style="max-height: 110px;">
                </div>
            </div>
        </div>
    </template>

    <!-- ref-image-item-template: Thumbnail with remove button for reference image -->
    <template id="ref-image-item-template">
        <div class="ref-image-item position-relative" style="width: 80px; height: 80px; flex-shrink: 0;">
            <img class="ref-image-thumbnail" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #495057;" alt="Reference image">
            <button class="btn btn-sm btn-danger position-absolute top-0 end-0 m-1 remove-ref-image-btn" style="width: 20px; height: 20px; padding: 0; font-size: 12px; line-height: 1;" type="button" title="Remove">X</button>
        </div>
    </template>

    <!-- ref-images-dialog-template: Dialog for selecting or uploading reference images -->
    <template id="ref-images-dialog-template">
        <div class="modal modal-lg fade" id="ref-images-dialog" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-scrollable">
                <div class="modal-content bg-dark text-white">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Add Reference Images</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <input id="ref-images-search" type="text" class="form-control bg-dark text-white border-secondary" placeholder="Search by title..." autocomplete="off">
                            </div>
                            <div class="col-md-4 position-relative">
                                <input id="ref-images-tag-filter" type="text" class="form-control bg-dark text-white border-secondary" placeholder="Filter by tag..." autocomplete="off">
                                <div id="tag-filter-suggestions" class="dropdown-menu position-absolute w-100" style="z-index: 1000; max-height: 300px; overflow-y: auto;"></div>
                            </div>
                            <div class="col-md-4">
                                <select id="ref-images-rating-filter" class="form-select bg-dark text-white border-secondary">
                                    <option value="">All ratings</option>
                                    <option value="5">★★★★★</option>
                                    <option value="4">★★★★☆+</option>
                                    <option value="3">★★★☆☆+</option>
                                    <option value="2">★★☆☆☆+</option>
                                    <option value="1">★☆☆☆☆+</option>
                                    <option value="0">Unrated</option>
                                </select>
                            </div>
                        </div>
                        <ul class="nav nav-tabs border-secondary mb-3" id="ref-images-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active text-white" id="browse-tab" type="button" role="tab">Browse</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link text-white" id="upload-tab" type="button" role="tab">Upload</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="ref-images-tab-content">
                            <div class="tab-pane fade show active" id="browse-pane" role="tabpanel">
                                <div id="ref-images-browse-list">
                                </div>
                            </div>
                            <div class="tab-pane fade" id="upload-pane" role="tabpanel">
                                <div class="d-flex flex-column align-items-center justify-content-center p-5 border border-secondary rounded" style="min-height: 200px;">
                                    <p class="text-muted mb-3">Drop an image here or click to upload</p>
                                    <button id="ref-images-upload-btn" class="btn btn-primary" type="button">Upload Image</button>
                                    <input type="file" id="ref-images-file-input" accept="image/*" style="display: none;">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <div id="ref-images-selected-count" class="me-auto small text-muted">0 images selected</div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" id="ref-images-add-selected-btn" disabled>Add Selected</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ref-image-dialog-group-template: Group of images from one conversation -->
    <template id="ref-image-dialog-group-template">
        <div class="ref-image-group mb-4">
            <div class="ref-image-title-bar row align-items-center mb-2 p-2 bg-secondary rounded cursor-pointer" role="button" tabindex="0">
                <div class="col text-start">
                    <span class="conversation-title text-white"></span>
                </div>
                <div class="col-auto text-end">
                    <span class="chevron collapsed">▼</span>
                    <span class="conversation-count badge bg-secondary ms-2"></span>
                </div>
            </div>
            <div class="collapse">
                <div class="ref-images-grid d-flex flex-wrap gap-2 p-2 bg-dark rounded">
                </div>
            </div>
        </div>
    </template>

    <!-- ref-image-dialog-item-template: Selectable image item in dialog -->
    <template id="ref-image-dialog-item-template">
        <div class="ref-image-dialog-item position-relative" style="height: 256px; width: auto; min-width: 100px; cursor: pointer; flex-shrink: 0;">
            <input type="checkbox" class="ref-image-checkbox position-absolute top-0 left-0 m-1" style="z-index: 2;">
            <img class="ref-image-dialog-thumbnail" style="width: 100%; height: 100%; object-fit: contain; border-radius: 4px; border: 2px solid transparent;" alt="Reference image">
        </div>
    </template>

    <!-- tag-badge-template: Badge displaying a single tag with remove button -->
    <template id="tag-badge-template">
        <span class="badge bg-secondary tag-badge me-1 mb-1">
            <span class="tag-text"></span>
            <button type="button" class="btn-close btn-close-white ms-1 remove-tag-btn" style="font-size: 0.5rem;" aria-label="Remove"></button>
        </span>
    </template>

    <!-- tag-editor-modal-template: Modal for editing image tags -->
    <template id="tag-editor-modal-template">
        <div class="modal fade" id="tag-editor-modal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content bg-dark text-white">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Edit Image Tags</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="current-tags-container mb-3">
                            <div class="current-tags d-flex flex-wrap"></div>
                        </div>
                        <div class="tag-input-group position-relative">
                            <input type="text" class="form-control bg-dark text-white border-secondary tag-input" placeholder="Add tag..." autocomplete="off">
                            <div class="tag-suggestions dropdown-menu position-absolute w-100" style="z-index: 1000; max-height: 200px; overflow-y: auto;"></div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary save-tags-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <style>
        .message-entry .card {
            border-color: #495057;
        }
        .user-instructions {
            background-color: #495057 !important;
            border-color: #495057 !important;
        }
        .llm-text-content.collapsed {
            display: none;
        }
        .llm-text-content:not(.collapsed) {
            display: block;
        }
        .llm-response-section button:disabled {
            opacity: 0.5;
        }
        .images-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .image-item-container {
            display: flex;
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100vh;
        }
        .image-wrapper img {
            display: block;
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
        }
        .image-wrapper .image-btn {
            position: static;
            font-size: 1.4rem;
            padding: 6px 10px;
            background-color: rgba(60, 60, 60, 0.5);
            border: 1px solid black;
            border-radius: 16px;
        }
        .image-wrapper .image-btn:hover {
            background-color: rgba(90, 90, 90, 0.8);
        }
        .image-wrapper .top-buttons {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            align-items: center;
        }
        .image-wrapper .bottom-buttons {
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            align-items: center;
        }
        .ref-images-toolbar {
            padding: 0.5rem;
            background-color: #2d2d2d;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
            transition: height 0.3s ease;
        }
        .ref-images-toolbar.empty {
            min-height: 38px;
        }
        .ref-images-toolbar.with-images {
            min-height: 128px;
        }
        .ref-images-container {
            flex-grow: 1;
        }
        .ref-images-container::-webkit-scrollbar {
            height: 6px;
        }
        .ref-images-container::-webkit-scrollbar-track {
            background: #495057;
        }
        .ref-images-container::-webkit-scrollbar-thumb {
            background: #6c757d;
            border-radius: 3px;
        }
        .ref-image-thumbnail:hover {
            opacity: 0.8;
        }
        .ref-image-dialog-item:hover .ref-image-dialog-thumbnail {
            border-color: #6c757d;
        }
        .ref-image-dialog-item input:checked ~ .ref-image-dialog-thumbnail {
            border-color: #0d6efd;
        }
        .broken-image img {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        .ref-images-grid {
            min-height: 260px;
            position: relative;
            display: none;
        }
        .ref-images-grid.show {
            display: flex;
        }
        .ref-images-grid .spinner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }
        .ref-images-grid .spinner-overlay::after {
            content: "";
            width: 40px;
            height: 40px;
            border: 4px solid #6c757d;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .chevron {
            display: inline-block;
            transform: rotate(0deg);
            transition: transform 0.2s ease;
            margin: 0 8px;
            font-size: 14px;
            line-height: 1;
        }
        .chevron.collapsed {
            transform: rotate(0deg);
        }
        .chevron.expanded {
            transform: rotate(180deg);
        }
        .image-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px 8px;
            justify-content: center;
        }
        .image-wrapper .tag-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
        }
        .tag-badge .remove-tag-btn {
            font-size: 0.5rem;
            padding: 0.15rem 0.25rem;
            margin-left: 2px;
        }
        .current-tags {
            min-height: 32px;
        }
        .tag-suggestions .dropdown-item,
        .tag-filter-suggestions .dropdown-item {
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tag-suggestions .dropdown-item:hover,
        .tag-filter-suggestions .dropdown-item:hover {
            background-color: #495057;
        }
        .rating-overlay {
            position: absolute;
            bottom: 5px;
            left: 5px;
            display: flex;
            gap: 2px;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }
        .rating-overlay .star {
            color: #ffc107;
            font-size: 0.8rem;
            line-height: 1;
        }
        .rating-overlay .star.empty {
            color: #6c757d;
        }
        .rating-picker {
            position: absolute;
            background: rgba(40,40,40,0.95);
            border: 1px solid #495057;
            border-radius: 4px;
            padding: 4px 8px;
            display: flex;
            gap: 2px;
            z-index: 100;
            white-space: nowrap;
        }
        .rating-picker .rating-star {
            cursor: pointer;
            font-size: 1.1rem;
            color: #6c757d;
            line-height: 1;
            padding: 2px;
        }
        .rating-picker .rating-star:hover,
        .rating-picker .rating-star.active {
            color: #ffc107;
            transform: scale(1.1);
        }
        .rating-picker .clear-rating-btn {
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.8rem;
            line-height: 1;
        }
        .rating-picker .clear-rating-btn:hover {
            color: #dc3545;
        }
        .image-item-container.filtered-out {
            display: none;
        }
        .project-editor-header:hover {
            background-color: #5a6268 !important;
        }
        .project-editor-body label.form-label {
            margin-bottom: 0.25rem;
        }
        .project-editor-body hr {
            border-color: #495057;
        }
        .nav-tabs .nav-link {
            color: #adb5bd;
        }
        .nav-tabs .nav-link:hover {
            color: #fff;
        }
        .nav-tabs .nav-link.active {
            color: #fff !important;
            background-color: #343a40 !important;
            border-color: #495057 #495057 #343a40 !important;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(reg) {
                    console.log('Service Worker registered');
                }).catch(function(err) {
                    console.error('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
